services:
  icecast:
    image: libretime/icecast:2.4.4
    container_name: sleepnoise-icecast
    restart: unless-stopped
    ports:
      - "${SLEEPNOISE_PORT:-8010}:8000"
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD}
      - ICECAST_RELAY_PASSWORD=${ICECAST_RELAY_PASSWORD}
      - ICECAST_MAX_CLIENTS=32
      - ICECAST_MAX_SOURCES=8
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/status-json.xsl > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  noisegen:
    image: lscr.io/linuxserver/ffmpeg:latest
    container_name: sleepnoise-gen
    restart: unless-stopped
    depends_on:
      - icecast
    command:
      - -hide_banner
      - -loglevel
      - warning
      - -re
      - -f
      - lavfi
      - -i
      - anoisesrc=colour=brown:seed=42:sample_rate=48000:amplitude=0.7
      - -re
      - -f
      - lavfi
      - -i
      - anoisesrc=colour=brown:seed=1337:sample_rate=48000:amplitude=0.7
      - -re
      - -f
      - lavfi
      - -i
      - anoisesrc=colour=pink:seed=7:sample_rate=48000:amplitude=0.5
      - -re
      - -f
      - lavfi
      - -i
      - anoisesrc=colour=pink:seed=99:sample_rate=48000:amplitude=0.5
      - -re
      - -f
      - lavfi
      - -i
      - anoisesrc=colour=white:seed=5:sample_rate=48000:amplitude=0.35
      - -re
      - -f
      - lavfi
      - -i
      - anoisesrc=colour=white:seed=23:sample_rate=48000:amplitude=0.35
      - -filter_complex
      - "[0:a][1:a]join=inputs=2:channel_layout=stereo,asplit=2[brown][tosoft];[tosoft]lowpass=f=400,volume=5dB[soft];[2:a][3:a]join=inputs=2:channel_layout=stereo[pink];[4:a][5:a]join=inputs=2:channel_layout=stereo[white]"
      - -map
      - "[brown]"
      - -c:a
      - libmp3lame
      - -b:a
      - 192k
      - -content_type
      - audio/mpeg
      - -ice_name
      - SleepNoise Brown
      - -f
      - mp3
      - icecast://source:${ICECAST_SOURCE_PASSWORD}@icecast:8000/brown.mp3
      - -map
      - "[soft]"
      - -c:a
      - libmp3lame
      - -b:a
      - 192k
      - -content_type
      - audio/mpeg
      - -ice_name
      - SleepNoise Deep
      - -f
      - mp3
      - icecast://source:${ICECAST_SOURCE_PASSWORD}@icecast:8000/deep.mp3
      - -map
      - "[pink]"
      - -c:a
      - libmp3lame
      - -b:a
      - 192k
      - -content_type
      - audio/mpeg
      - -ice_name
      - SleepNoise Pink
      - -f
      - mp3
      - icecast://source:${ICECAST_SOURCE_PASSWORD}@icecast:8000/pink.mp3
      - -map
      - "[white]"
      - -c:a
      - libmp3lame
      - -b:a
      - 192k
      - -content_type
      - audio/mpeg
      - -ice_name
      - SleepNoise White
      - -f
      - mp3
      - icecast://source:${ICECAST_SOURCE_PASSWORD}@icecast:8000/white.mp3

  app:
    build: ./app
    container_name: sleepnoise-app
    restart: unless-stopped
    network_mode: host
    depends_on:
      - icecast
    environment:
      - APP_PORT=${APP_PORT:-8011}
      - STREAM_BASE_URL=${STREAM_BASE_URL}
      - DEFAULT_ROOM=${DEFAULT_ROOM:-}
      - MAX_VOLUME=${MAX_VOLUME:-40}
      - SONOS_IPS=${SONOS_IPS:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,os;urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('APP_PORT','8011')+'/api/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
