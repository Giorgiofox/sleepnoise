<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0e14">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SleepNoise">
<title>SleepNoise</title>
<style>
  :root {
    --bg: #0c0e14;
    --card: #151823;
    --card-hover: #1b1f2e;
    --border: #262b3d;
    --text: #d7dae3;
    --muted: #7a8095;
    --accent: #e8a849;
    --accent-dim: #8a6425;
    --green: #6fbf8b;
    --red: #c96b6b;
  }
  html[data-mode="night"] {
    --bg: #000000;
    --card: #150303;
    --card-hover: #1e0505;
    --border: #3d0c0c;
    --text: #d64545;
    --muted: #7c2a2a;
    --accent: #ff453a;
    --accent-dim: #8f1f16;
    --green: #d64545;
    --red: #ff453a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    padding: calc(1.2rem + env(safe-area-inset-top)) 1rem calc(3rem + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.4rem; gap: 0.8rem; }
  h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: 0.04em; margin-right: auto; }
  h1 span { color: var(--accent); }
  #conn { font-size: 0.75rem; color: var(--muted); }
  #nightbtn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 0.35rem 0.8rem; font-size: 0.75rem; cursor: pointer;
  }
  html[data-mode="night"] #nightbtn { border-color: var(--accent); color: var(--accent); }
  html[data-mode="night"] body { background: #000000; }
  html[data-mode="night"] #btn-start { color: #1a0000; }
  h2 {
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--muted); margin: 1.4rem 0 0.6rem;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .chip {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 999px; padding: 0.55rem 1rem; font-size: 0.9rem; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .chip.sel { border-color: var(--accent); color: var(--accent); background: var(--card-hover); }
  .chip .sub { display: block; font-size: 0.68rem; color: var(--muted); }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 0.9rem; cursor: pointer; text-align: left; color: var(--text);
    transition: border-color 0.15s, background 0.15s;
  }
  .card.sel { border-color: var(--accent); background: var(--card-hover); }
  .card .t { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; }
  .card.sel .t { color: var(--accent); }
  .card .d { font-size: 0.74rem; color: var(--muted); line-height: 1.35; }
  .row { display: flex; align-items: center; gap: 0.8rem; }
  input[type=range] {
    flex: 1; appearance: none; -webkit-appearance: none; height: 6px; border-radius: 3px;
    background: var(--border); outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: none;
  }
  input[type=range]::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%; background: var(--accent);
    cursor: pointer; border: none;
  }
  #volval { min-width: 3.2rem; text-align: right; font-variant-numeric: tabular-nums; }
  .actions { display: grid; grid-template-columns: 2fr 1fr; gap: 0.6rem; margin-top: 1.6rem; }
  button.big {
    border: none; border-radius: 14px; padding: 1.05rem; font-size: 1.05rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.03em;
  }
  #btn-start { background: var(--accent); color: #14100a; }
  #btn-start:active { background: var(--accent-dim); }
  #btn-stop { background: var(--card); color: var(--red); border: 1px solid var(--border); }
  #btn-stop:active { background: var(--card-hover); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  #status {
    margin-top: 1.4rem; background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 0.9rem; font-size: 0.85rem; line-height: 1.6;
  }
  #status .on { color: var(--green); font-weight: 600; }
  #status .off { color: var(--muted); }
  #status .tmr { color: var(--accent); }
  .err { color: var(--red); font-size: 0.8rem; margin-top: 0.6rem; min-height: 1.1rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Sleep<span>Noise</span></h1>
    <button id="nightbtn">Night</button>
    <div id="conn">connecting</div>
  </header>

  <h2>Speaker</h2>
  <div class="chips" id="speakers"></div>

  <h2>Sound</h2>
  <div class="cards" id="sounds"></div>

  <h2>Volume</h2>
  <div class="row">
    <input type="range" id="vol" min="1" max="40" value="15">
    <div id="volval">15%</div>
  </div>

  <h2>Sleep timer</h2>
  <div class="chips" id="timers"></div>

  <div class="actions">
    <button class="big" id="btn-start">Start</button>
    <button class="big" id="btn-stop">Stop</button>
  </div>
  <div class="err" id="err"></div>

  <h2>Now playing</h2>
  <div id="status">loading</div>
</div>

<!-- Hidden native switch: toggling it via JS produces a haptic tick on iOS Safari >= 17.4 -->
<input type="checkbox" switch id="haptic-sw" style="position:absolute;left:-9999px" aria-hidden="true" tabindex="-1">
<label for="haptic-sw" id="haptic-lb" style="position:absolute;left:-9999px" aria-hidden="true"></label>

<script>
function haptic(pattern) {
  if (navigator.vibrate) { navigator.vibrate(pattern || 10); return; }
  try { document.getElementById("haptic-lb").click(); } catch (e) {}
}

const THEME_META = document.querySelector('meta[name="theme-color"]');
function applyMode(mode) {
  document.documentElement.dataset.mode = mode;
  document.getElementById("nightbtn").textContent = mode === "night" ? "Day" : "Night";
  THEME_META.setAttribute("content", mode === "night" ? "#000000" : "#0c0e14");
}
document.getElementById("nightbtn").onclick = () => {
  haptic();
  const next = document.documentElement.dataset.mode === "night" ? "dark" : "night";
  localStorage.setItem("sleepnoise-mode", next);
  applyMode(next);
};
applyMode(new URLSearchParams(location.search).get("mode") ||
          localStorage.getItem("sleepnoise-mode") || "dark");

const TIMERS = [
  { label: "Off", sub: "play forever", min: null },
  { label: "30 min", min: 30 },
  { label: "1 h", min: 60 },
  { label: "2 h", min: 120 },
  { label: "4 h", min: 240 },
  { label: "8 h", min: 480 },
];
let st = { speakers: [], sounds: {}, max_volume: 40, default_room: "" };
let sel = { speaker: null, sound: "deep", timer: 480 };

const $ = id => document.getElementById(id);

async function api(path, body) {
  const res = await fetch(path, body === undefined ? {} : {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    let msg = res.statusText;
    try { msg = (await res.json()).detail || msg; } catch (e) {}
    throw new Error(msg);
  }
  return res.json();
}

function renderSpeakers() {
  $("speakers").innerHTML = "";
  if (!st.speakers.length) {
    $("speakers").innerHTML = '<span style="color:var(--muted);font-size:0.85rem">no speakers found</span>';
    return;
  }
  for (const sp of st.speakers) {
    const b = document.createElement("button");
    b.className = "chip" + (sp.name === sel.speaker ? " sel" : "");
    b.textContent = sp.name;
    b.onclick = () => { haptic(); sel.speaker = sp.name; renderSpeakers(); };
    $("speakers").appendChild(b);
  }
}

function renderSounds() {
  $("sounds").innerHTML = "";
  for (const [key, s] of Object.entries(st.sounds)) {
    const b = document.createElement("button");
    b.className = "card" + (key === sel.sound ? " sel" : "");
    b.innerHTML = `<div class="t">${s.title}</div><div class="d">${s.desc}</div>`;
    b.onclick = () => { haptic(); sel.sound = key; renderSounds(); };
    $("sounds").appendChild(b);
  }
}

function renderTimers() {
  $("timers").innerHTML = "";
  for (const t of TIMERS) {
    const b = document.createElement("button");
    b.className = "chip" + (t.min === sel.timer ? " sel" : "");
    b.innerHTML = t.label + (t.sub ? `<span class="sub">${t.sub}</span>` : "");
    b.onclick = () => { haptic(); sel.timer = t.min; renderTimers(); };
    $("timers").appendChild(b);
  }
}

function renderStatus() {
  const rows = st.speakers.map(sp => {
    if (sp.error) return `<div>${sp.name}: <span class="off">unreachable</span></div>`;
    const playing = sp.state === "PLAYING" && sp.sound;
    const label = playing
      ? `<span class="on">${st.sounds[sp.sound] ? st.sounds[sp.sound].title : sp.sound}</span>` +
        ` at ${sp.volume}%` +
        (sp.timer_remaining ? ` <span class="tmr">(${sp.timer_remaining} left)</span>` : "")
      : `<span class="off">${sp.state === "PLAYING" ? "playing other audio" : "idle"}</span>`;
    return `<div>${sp.name}: ${label}</div>`;
  });
  $("status").innerHTML = rows.join("") || '<span class="off">no data</span>';
}

async function refresh() {
  try {
    st = await api("/api/status");
    $("conn").textContent = "online";
    $("vol").max = st.max_volume;
    if (!sel.speaker) {
      const def = st.speakers.find(s => s.name === st.default_room);
      sel.speaker = def ? def.name : (st.speakers[0] || {}).name || null;
    }
    renderSpeakers(); renderSounds(); renderTimers(); renderStatus();
  } catch (e) {
    $("conn").textContent = "offline";
  }
}

$("vol").oninput = () => { $("volval").textContent = $("vol").value + "%"; };
$("vol").onchange = () => haptic();

$("btn-start").onclick = async () => {
  haptic([12, 40, 12]);
  $("err").textContent = "";
  $("btn-start").disabled = true;
  try {
    await api("/api/play", {
      speaker: sel.speaker,
      sound: sel.sound,
      volume: parseInt($("vol").value, 10),
      timer_minutes: sel.timer,
    });
    await refresh();
  } catch (e) {
    $("err").textContent = e.message;
  } finally {
    $("btn-start").disabled = false;
  }
};

$("btn-stop").onclick = async () => {
  haptic();
  $("err").textContent = "";
  try {
    await api("/api/stop", { speaker: sel.speaker });
    await refresh();
  } catch (e) {
    $("err").textContent = e.message;
  }
};

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
